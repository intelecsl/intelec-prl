<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Configurar DGP-PRL</title>
<script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js" crossorigin="anonymous"></script>
</head>
<body style="font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f1f5f9;">
  <div style="text-align:center;color:#0f3460;">
    <div style="font-weight:800;font-size:18px;margin-bottom:8px;">DGP-PRL - Intelec S.L.</div>
    <div style="color:#64748b;font-size:13px;">Cargando configuracion de la pestana...</div>
  </div>

<script>
  // URL del contenido real de la app (debe coincidir con el contentUrl de manifest.json)
  var CONTENT_URL = "https://intelecsl.github.io/intelec-prl/index.html";

  microsoftTeams.app.initialize().then(function () {
    microsoftTeams.pages.config.registerOnSaveHandler(function (saveEvent) {
      microsoftTeams.pages.config.setConfig({
        entityId: "dgpprl-tab",
        contentUrl: CONTENT_URL,
        websiteUrl: CONTENT_URL,
        suggestedDisplayName: "DGP-PRL"
      }).then(function(){
        saveEvent.notifySuccess();
      });
    });
    microsoftTeams.pages.config.setValidityState(true);
  }).catch(function(err){
    document.body.innerHTML = "<p style='color:#dc2626'>Error inicializando Teams: "+err+"</p>";
  });
</script>
</body>
</html>
